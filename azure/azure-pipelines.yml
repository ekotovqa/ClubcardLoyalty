# Azure DevOps pipeline для ClubcardLoyalty.Api
# Код лежит в GitHub, пайплайн и Release-история — в Azure DevOps (типичная гибридная
# схема, которая упоминалась в анализе вакансии: GitHub + Azure DevOps отдельно).
#
# Перед использованием:
# 1. Создайте Service Connection в Azure DevOps -> Project Settings -> Service connections
#    -> Azure Resource Manager -> выберите вашу подписку. Назовите её, например, "clubcard-azure-conn".
# 2. Подставьте имена ниже (azureSubscription, webAppName, resourceGroup).
# 3. Если репозиторий в GitHub — на вкладке Pipelines в Azure DevOps подключите GitHub
#    как источник через GitHub App авторизацию.

trigger:
  branches:
    include:
      - main

variables:
  buildConfiguration: 'Release'
  azureSubscription: 'clubcard-azure-conn'   # имя вашего Service Connection
  webAppName: 'app-clubcard-XXXXX'            # подставьте реальное имя Web App
  resourceGroup: 'rg-clubcard-loyalty'
  projectPath: 'ClubcardLoyalty.Api/ClubcardLoyalty.Api.csproj'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: Build
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 8 SDK'
            inputs:
              packageType: 'sdk'
              version: '8.0.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restore'
            inputs:
              command: 'restore'
              projects: '$(projectPath)'

          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: '$(projectPath)'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          # Если появятся unit-тесты (рекомендую добавить хотя бы пару для Redeem-логики) —
          # раскомментируйте:
          # - task: DotNetCoreCLI@2
          #   displayName: 'Test'
          #   inputs:
          #     command: 'test'
          #     projects: '**/*Tests.csproj'
          #     arguments: '--configuration $(buildConfiguration) --no-build'

          - task: DotNetCoreCLI@2
            displayName: 'Publish'
            inputs:
              command: 'publish'
              projects: '$(projectPath)'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish --no-build'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/publish'
              ArtifactName: 'drop'

  - stage: Deploy
    displayName: 'Deploy to App Service'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: Deploy
        environment: 'clubcard-prod'   # можно завести Environment в Azure DevOps с approval-гейтом
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webAppLinux'
                    appName: '$(webAppName)'
                    package: '$(Pipeline.Workspace)/drop/*.zip'
